<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focinhos · Admin — Verificação de abrigos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --pink:#ff5e62; --orange:#ffb347; --grad:linear-gradient(45deg,#ff5e62,#ffb347);
      --bg:#f3f4f6; --text:#1f1f24; --muted:#8a8a93; --border:#ececf0; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Poppins",-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:24px; }
    .wrap { max-width:820px; margin:0 auto; }
    h1 { font-size:1.5rem; margin-bottom:4px; }
    .sub { color:var(--muted); font-size:.9rem; margin-bottom:20px; }
    .barra { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    input { flex:1; min-width:200px; padding:12px 14px; border:1.5px solid var(--border); border-radius:12px; font-family:inherit; font-size:.95rem; }
    button { background:var(--grad); color:#fff; border:none; border-radius:999px; padding:12px 20px; font-weight:700; font-family:inherit; cursor:pointer; }
    button.sec { background:#fff; color:var(--pink); border:1.5px solid var(--pink); }
    .card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:12px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
    .card .body { flex:1; min-width:200px; }
    .card strong { display:block; font-size:1.05rem; }
    .card small { display:block; color:var(--muted); line-height:1.5; }
    .pill { font-size:.72rem; font-weight:700; padding:3px 10px; border-radius:999px; }
    .pill.ok { background:#def5e9; color:#18a565; }
    .pill.pend { background:#fff7ea; color:#8a5a00; }
    .msg { padding:12px 14px; border-radius:12px; margin-bottom:16px; font-size:.9rem; }
    .msg.err { background:#ffe0e6; color:#c62a4e; }
    .msg.ok { background:#def5e9; color:#18a565; }
    .hint { color:var(--muted); font-size:.82rem; margin-top:16px; line-height:1.5; }
    .acoes { display:flex; gap:8px; flex-wrap:wrap; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; padding:18px; }
    .modal.hidden { display:none; }
    .modal-card { background:#fff; border-radius:16px; padding:22px; width:100%; max-width:520px; max-height:88vh; overflow-y:auto; }
    .modal-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
    .modal-head h2 { font-size:1.2rem; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .modal-head #fechar { background:#f0f0f3; color:var(--text); width:32px; height:32px; border-radius:50%; padding:0; }
    .modal-card h3 { font-size:.8rem; text-transform:uppercase; letter-spacing:.5px; color:var(--pink); margin:18px 0 8px; }
    .dl { display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-bottom:1px solid var(--border); font-size:.9rem; }
    .dl span { color:var(--muted); }
    .dl strong { text-align:right; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🔒 Admin — Verificação de abrigos</h1>
    <p class="sub">Somente abrigos <strong>verificados</strong> têm seus animais exibidos aos adotantes.</p>
    <div class="barra">
      <input id="token" type="password" placeholder="Cole aqui o ADMIN_TOKEN" autocomplete="off" />
      <button id="btnCarregar">Carregar abrigos</button>
    </div>
    <div id="msg"></div>
    <div id="lista"></div>
    <p class="hint">O token é o valor da variável <code>ADMIN_TOKEN</code> configurada no Render. Ele fica só na memória desta página — não é salvo.</p>
  </div>

  <div id="modal" class="modal hidden"></div>

  <script>
    const $ = (s) => document.querySelector(s);
    const api = (path, opts={}) => fetch(path, { headers:{"Content-Type":"application/json"}, ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined }).then(r => r.json());

    function msg(txt, tipo) { $("#msg").innerHTML = txt ? `<div class="msg ${tipo}">${txt}</div>` : ""; }

    async function carregar() {
      const token = $("#token").value.trim();
      if (!token) return msg("Informe o token.", "err");
      msg("Carregando...", "ok");
      const d = await api("/api/admin/abrigos?token=" + encodeURIComponent(token));
      if (d.erro) return msg(d.erro + " (token incorreto?)", "err");
      msg("", "");
      render(d.abrigos || []);
    }

    function render(abrigos) {
      const box = $("#lista");
      if (!abrigos.length) { box.innerHTML = `<p class="hint">Nenhum abrigo cadastrado.</p>`; return; }
      box.innerHTML = abrigos.map((a) => `
        <div class="card">
          <div class="body">
            <strong>${esc(a.nome || "—")}
              <span class="pill ${a.verificado ? "ok" : "pend"}">${a.verificado ? "Verificado" : "Em análise"}</span></strong>
            <small>CNPJ: ${esc(a.cnpj || "—")}</small>
            <small>Endereço: ${esc(a.endereco || "—")}</small>
            <small>E-mail: ${esc(a.email || "—")} · Tel: ${esc(a.telefone || "—")}</small>
          </div>
          <div class="acoes">
            <button class="sec" data-det="${a.id}">Ver detalhes</button>
            <button class="${a.verificado ? "sec" : ""}" data-id="${a.id}" data-verif="${a.verificado ? 0 : 1}">
              ${a.verificado ? "Remover verificação" : "Verificar"}
            </button>
          </div>
        </div>`).join("");
      box.querySelectorAll("button[data-id]").forEach((b) =>
        b.addEventListener("click", () => verificar(b.dataset.id, b.dataset.verif === "1")));
      box.querySelectorAll("button[data-det]").forEach((b) =>
        b.addEventListener("click", () => detalhes(b.dataset.det)));
    }

    async function detalhes(doadorId) {
      const token = $("#token").value.trim();
      const d = await api("/api/admin/abrigo?token=" + encodeURIComponent(token) + "&doadorId=" + doadorId);
      if (d.erro) return msg(d.erro, "err");
      const dd = d.doador || {}, c = d.conta || {}, animais = d.animais || [];
      const linha = (r, v) => `<div class="dl"><span>${r}</span><strong>${esc(v)}</strong></div>`;
      $("#modal").innerHTML = `
        <div class="modal-card">
          <div class="modal-head">
            <h2>${esc(dd.nome || "Instituição")}
              <span class="pill ${dd.verificado ? "ok" : "pend"}">${dd.verificado ? "Verificado" : "Em análise"}</span></h2>
            <button id="fechar">✕</button>
          </div>
          <h3>Dados do abrigo</h3>
          ${linha("CNPJ", dd.cnpj)}
          ${linha("Endereço da sede", dd.endereco)}
          ${linha("E-mail", dd.email)}
          ${linha("Telefone", dd.telefone)}
          <h3>Conta responsável</h3>
          ${c.id ? linha("Nome", c.nome) + linha("E-mail", c.email) + linha("Telefone", c.telefone) + linha("Criada em", c.criadoEm) : '<p class="hint">Sem conta vinculada.</p>'}
          <h3>Animais (${animais.length})</h3>
          ${animais.length ? animais.map((a) =>
            `<div class="dl"><span>${esc(a.nome)} ${a.especie ? "(" + esc(a.especie) + ")" : ""}</span><strong>${a.adotado ? "Doado" : "Disponível"} · ${a.curtidas} curtidas · ${a.conversas} conversas</strong></div>`).join("")
            : '<p class="hint">Nenhum animal cadastrado.</p>'}
          <div style="margin-top:18px">
            <button class="${dd.verificado ? "sec" : ""}" id="modalVerif">${dd.verificado ? "Remover verificação" : "Verificar abrigo"}</button>
          </div>
        </div>`;
      $("#modal").classList.remove("hidden");
      $("#fechar").addEventListener("click", () => $("#modal").classList.add("hidden"));
      $("#modalVerif").addEventListener("click", async () => {
        await verificar(doadorId, !dd.verificado);
        $("#modal").classList.add("hidden");
      });
    }

    async function verificar(doadorId, verificado) {
      const token = $("#token").value.trim();
      const r = await api("/api/admin/verificar", { method:"POST", body:{ token, doadorId, verificado } });
      if (r.erro) return msg(r.erro, "err");
      msg(verificado ? "Abrigo verificado!" : "Verificação removida.", "ok");
      carregar();
    }

    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
      ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c])); }

    $("#btnCarregar").addEventListener("click", carregar);
    $("#token").addEventListener("keydown", (e) => { if (e.key === "Enter") carregar(); });
  </script>
</body>
</html>
